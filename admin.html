<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель — Домашний Уют</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --white: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.1);
            --radius: 14px;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            min-height: 100vh;
            color: var(--text);
        }

        .header {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 15px 0;
        }
        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 24px;
            font-weight: 700;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo span { font-size: 32px; }
        .header-actions { display: flex; gap: 10px; }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            font-size: 14px;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-outline { background: transparent; color: white; border: 2px solid rgba(255,255,255,0.3); }
        .btn-outline:hover { background: rgba(255,255,255,0.1); }

        .container { max-width: 1400px; margin: 0 auto; padding: 30px; }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: var(--radius);
            padding: 25px;
            color: white;
        }
        .stat-card .stat-value { font-size: 36px; font-weight: 700; margin-bottom: 5px; }
        .stat-card .stat-label { font-size: 14px; opacity: 0.7; }

        .section-title {
            color: white;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .table-wrapper {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: var(--radius);
            overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        thead { background: rgba(255,255,255,0.05); }
        th {
            color: white;
            padding: 16px;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
        }
        td {
            color: rgba(255,255,255,0.9);
            padding: 14px 16px;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 14px;
        }
        tr:hover td { background: rgba(255,255,255,0.03); }
        .product-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .product-thumb {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            object-fit: cover;
            background: #e2e8f0;
            flex-shrink: 0;
        }
        .product-emoji-placeholder {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }
        .actions { display: flex; gap: 8px; }
        .icon-btn {
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: var(--transition);
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .icon-btn:hover { background: rgba(255,255,255,0.2); }
        .icon-btn.edit:hover { background: var(--primary); }
        .icon-btn.delete:hover { background: var(--danger); }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 999;
            padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--white);
            border-radius: var(--radius);
            padding: 35px;
            max-width: 550px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-content h3 {
            font-size: 22px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .field { margin-bottom: 18px; }
        .field label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 13px;
            color: var(--text);
        }
        .field input,
        .field textarea,
        .field select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-family: inherit;
            font-size: 15px;
            transition: var(--transition);
            background: var(--bg);
        }
        .field textarea { resize: vertical; min-height: 80px; }
        .field input:focus,
        .field textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
        }
        .field-hint {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 4px;
        }

        /* Загрузка файла */
        .file-upload-area {
            border: 2px dashed var(--border);
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background: var(--bg);
        }
        .file-upload-area:hover {
            border-color: var(--primary);
            background: #eef2ff;
        }
        .file-upload-area.drag-over {
            border-color: var(--success);
            background: #f0fdf4;
        }
        .file-upload-icon { font-size: 40px; margin-bottom: 10px; }
        .file-upload-text { font-size: 14px; color: var(--text); }
        .file-upload-hint { font-size: 12px; color: var(--text-light); margin-top: 5px; }
        #imagePreview {
            width: 100%;
            max-height: 200px;
            object-fit: contain;
            border-radius: 10px;
            margin-top: 10px;
            background: var(--bg);
        }
        .upload-progress {
            margin-top: 10px;
            background: var(--border);
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
        }
        .upload-progress-bar {
            height: 100%;
            background: var(--primary);
            transition: width 0.3s;
            border-radius: 10px;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }
        .modal-btns .btn { flex: 1; }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: rgba(255,255,255,0.5);
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            table { font-size: 12px; }
            th, td { padding: 10px; }
            .header-inner { flex-direction: column; gap: 15px; }
            .modal-content { padding: 25px; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-inner">
            <div class="logo"><span>⚙️</span> Админ-панель</div>
            <div class="header-actions">
                <button class="btn btn-outline" onclick="window.open('index.html', '_blank')">🏠 На сайт</button>
                <button class="btn btn-outline" onclick="logout()">🚪 Выйти</button>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalProducts">0</div>
                <div class="stat-label">📦 Всего товаров</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalOrders">0</div>
                <div class="stat-label">🛒 Всего заказов</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalUsers">0</div>
                <div class="stat-label">👥 Пользователей</div>
            </div>
        </div>

        <div class="section-title">
            <span>📦 Товары</span>
            <button class="btn btn-success" onclick="openAddModal()">+ Добавить товар</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Товар</th>
                        <th>Цена</th>
                        <th>Описание</th>
                        <th>Создан</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="productTableBody">
                    <tr><td colspan="5"><div class="empty-state">📦 Загрузка...</div></td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Модальное окно -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <h3 id="modalTitle">📝 Добавить товар</h3>
            <input type="hidden" id="editId">
            <input type="hidden" id="existingImageUrl">

            <div class="field">
                <label>Название товара *</label>
                <input type="text" id="prodName" placeholder="Например: Умная лампа">
            </div>
            <div class="field">
                <label>Цена (₽) *</label>
                <input type="number" id="prodPrice" placeholder="1499" min="0" step="1">
            </div>
            <div class="field">
                <label>Описание</label>
                <textarea id="prodDesc" placeholder="Краткое описание товара..."></textarea>
            </div>
            <div class="field">
                <label>Категория</label>
                <select id="prodCategory">
                    <option value="Освещение">💡 Освещение</option>
                    <option value="Декор">🎨 Декор</option>
                    <option value="Текстиль">🧶 Текстиль</option>
                    <option value="Мебель">🪑 Мебель</option>
                    <option value="Кухня">🍳 Кухня</option>
                    <option value="Другое">📦 Другое</option>
                </select>
            </div>
            <div class="field">
                <label>Фото товара</label>
                <div class="file-upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
                    <div class="file-upload-icon">📸</div>
                    <div class="file-upload-text">Нажмите или перетащите фото сюда</div>
                    <div class="file-upload-hint">JPG, PNG, WebP • макс. 5 МБ</div>
                </div>
                <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="handleFileSelect(event)">
                <img id="imagePreview" style="display:none;" alt="Превью">
                <div class="upload-progress" id="uploadProgress" style="display:none;">
                    <div class="upload-progress-bar" id="uploadProgressBar" style="width:0%;"></div>
                </div>
                <button class="btn btn-outline" id="removeImageBtn" style="display:none;margin-top:10px;width:100%;color:var(--text);border-color:var(--border);" onclick="removeImage()">🗑️ Удалить фото</button>
            </div>
            <div class="modal-btns">
                <button class="btn btn-primary" id="saveBtn" onclick="saveProduct()">💾 Сохранить</button>
                <button class="btn btn-outline" style="color:var(--text);border-color:var(--border);" onclick="closeModal()">Отмена</button>
            </div>
        </div>
    </div>

    <script>
        // ===== ПОДКЛЮЧЕНИЕ К SUPABASE =====
        const SB = supabase.createClient(
            'https://riuftwtjtxmhyqwyfwta.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJpdWZ0d3RqdHhtaHlxd3lmd3RhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNTE2NzUsImV4cCI6MjA5NzcyNzY3NX0.uJCsY9ic9xLBJqYKEIbSvNqzYOKQFDzFqrK_zu2t6vw'
        );

        let user = null;
        let allProducts = [];
        let selectedFile = null; // Файл, выбранный пользователем

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        (async function init() {
            const { data: { session } } = await SB.auth.getSession();
            if (!session) {
                Swal.fire('Доступ запрещён', 'Сначала войдите', 'error').then(() => {
                    window.location.href = 'index.html';
                });
                return;
            }
            user = session.user;
            setupDragAndDrop();
            await loadStats();
            await loadProducts();
        })();

        // ===== DRAG & DROP =====
        function setupDragAndDrop() {
            const dropZone = document.getElementById('dropZone');
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, e => { e.preventDefault(); e.stopPropagation(); });
            });
            ['dragenter', 'dragover'].forEach(eventName => {
                dropZone.addEventListener(eventName, () => dropZone.classList.add('drag-over'));
            });
            ['dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, () => dropZone.classList.remove('drag-over'));
            });
            dropZone.addEventListener('drop', e => {
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('image/')) {
                    processFile(file);
                }
            });
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) processFile(file);
        }

        function processFile(file) {
            if (file.size > 5 * 1024 * 1024) {
                return Swal.fire('Ошибка', 'Файл слишком большой! Максимум 5 МБ', 'error');
            }
            selectedFile = file;
            // Показываем превью
            const reader = new FileReader();
            reader.onload = e => {
                const preview = document.getElementById('imagePreview');
                preview.src = e.target.result;
                preview.style.display = 'block';
                document.getElementById('removeImageBtn').style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        function removeImage() {
            selectedFile = null;
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('removeImageBtn').style.display = 'none';
            document.getElementById('fileInput').value = '';
            document.getElementById('existingImageUrl').value = '';
        }

        // ===== ЗАГРУЗКА СТАТИСТИКИ =====
        async function loadStats() {
            const [productsRes, ordersRes, usersRes] = await Promise.all([
                SB.from('products').select('*', { count: 'exact', head: true }),
                SB.from('orders').select('*', { count: 'exact', head: true }),
                SB.from('profiles').select('*', { count: 'exact', head: true })
            ]);
            document.getElementById('totalProducts').textContent = productsRes.count || 0;
            document.getElementById('totalOrders').textContent = ordersRes.count || 0;
            document.getElementById('totalUsers').textContent = usersRes.count || 0;
        }

        // ===== ЗАГРУЗКА ТОВАРОВ =====
        async function loadProducts() {
            const { data } = await SB.from('products').select('*').order('created_at', { ascending: false });
            allProducts = data || [];
            renderTable(allProducts);
        }

        function getEmoji(name) {
            const map = { 'Лампа':'💡', 'Подушка':'🛋️', 'Диффузор':'🌸', 'Часы':'🕐', 'Плед':'🧶', 'Стол':'🪑', 'Кружка':'☕' };
            for (const [key, e] of Object.entries(map)) { if (name.includes(key)) return e; }
            return '📦';
        }
        function getColor(name) {
            const colors = ['#e0e7ff','#fce7f3','#d1fae5','#fef3c7','#e0f2fe','#f3e8ff'];
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return colors[Math.abs(hash) % colors.length];
        }

        function renderTable(products) {
            const tbody = document.getElementById('productTableBody');
            if (!products.length) {
                tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state">📦 Нет товаров</div></td></tr>`;
                return;
            }
            tbody.innerHTML = products.map(p => `
                <tr>
                    <td>
                        <div class="product-cell">
                            ${p.image_url 
                                ? `<img src="${p.image_url}" class="product-thumb" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">`
                                : ''}
                            <div class="product-emoji-placeholder" style="background:${getColor(p.name)};${p.image_url ? 'display:none;' : ''}">
                                ${getEmoji(p.name)}
                            </div>
                            <div>
                                <strong>${p.name}</strong>
                                <br><small style="opacity:0.6;">${p.category || 'Без категории'}</small>
                            </div>
                        </div>
                    </td>
                    <td><strong>${p.price} ₽</strong></td>
                    <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.description || '—'}</td>
                    <td>${new Date(p.created_at).toLocaleDateString('ru-RU')}</td>
                    <td>
                        <div class="actions">
                            <button class="icon-btn edit" onclick="openEditModal('${p.id}')">✏️</button>
                            <button class="icon-btn delete" onclick="deleteProduct('${p.id}')">🗑️</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // ===== МОДАЛЬНОЕ ОКНО =====
        function resetModal() {
            selectedFile = null;
            document.getElementById('editId').value = '';
            document.getElementById('existingImageUrl').value = '';
            document.getElementById('prodName').value = '';
            document.getElementById('prodPrice').value = '';
            document.getElementById('prodDesc').value = '';
            document.getElementById('prodCategory').value = 'Другое';
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('removeImageBtn').style.display = 'none';
            document.getElementById('fileInput').value = '';
            document.getElementById('uploadProgress').style.display = 'none';
            document.getElementById('uploadProgressBar').style.width = '0%';
        }

        function openAddModal() {
            resetModal();
            document.getElementById('modalTitle').textContent = '📝 Добавить товар';
            document.getElementById('saveBtn').textContent = '💾 Сохранить';
            document.getElementById('productModal').classList.add('active');
        }

        function openEditModal(id) {
            const product = allProducts.find(p => p.id === id);
            if (!product) return;

            resetModal();
            document.getElementById('modalTitle').textContent = '✏️ Редактировать товар';
            document.getElementById('editId').value = product.id;
            document.getElementById('prodName').value = product.name || '';
            document.getElementById('prodPrice').value = product.price || '';
            document.getElementById('prodDesc').value = product.description || '';
            document.getElementById('prodCategory').value = product.category || 'Другое';
            document.getElementById('saveBtn').textContent = '💾 Обновить';

            if (product.image_url) {
                document.getElementById('existingImageUrl').value = product.image_url;
                document.getElementById('imagePreview').src = product.image_url;
                document.getElementById('imagePreview').style.display = 'block';
                document.getElementById('removeImageBtn').style.display = 'block';
            }

            document.getElementById('productModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('productModal').classList.remove('active');
            resetModal();
        }

        // ===== ЗАГРУЗКА ФАЙЛА В SUPABASE STORAGE =====
        async function uploadImage(file) {
            const progressBar = document.getElementById('uploadProgressBar');
            const progressDiv = document.getElementById('uploadProgress');
            progressDiv.style.display = 'block';
            progressBar.style.width = '0%';

            const fileName = `${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g, '_')}`;

            const { data, error } = await SB.storage
                .from('product-images')
                .upload(fileName, file, {
                    cacheControl: '3600',
                    upsert: false
                });

            progressDiv.style.display = 'none';

            if (error) {
                Swal.fire('Ошибка загрузки', error.message, 'error');
                return null;
            }

            // Получаем публичный URL
            const { data: urlData } = SB.storage
                .from('product-images')
                .getPublicUrl(fileName);

            return urlData.publicUrl;
        }

        // ===== СОХРАНЕНИЕ ТОВАРА =====
        async function saveProduct() {
            const btn = document.getElementById('saveBtn');
            const editId = document.getElementById('editId').value;

            let imageUrl = document.getElementById('existingImageUrl').value;

            // Если выбран новый файл — загружаем его
            if (selectedFile) {
                setLoading(btn, 'Загружаем фото...');
                const uploadedUrl = await uploadImage(selectedFile);
                if (uploadedUrl) {
                    imageUrl = uploadedUrl;
                } else {
                    resetBtn(btn, editId ? '💾 Обновить' : '💾 Сохранить');
                    return;
                }
            }

            // Если нажали "Удалить фото" и нет нового файла
            if (!selectedFile && !imageUrl && !editId) {
                imageUrl = '';
            }

            const productData = {
                name: document.getElementById('prodName').value.trim(),
                price: parseFloat(document.getElementById('prodPrice').value) || 0,
                description: document.getElementById('prodDesc').value.trim(),
                image_url: imageUrl || null,
                category: document.getElementById('prodCategory').value,
            };

            if (!productData.name) return Swal.fire('Ошибка', 'Введите название товара', 'error');
            if (!productData.price || productData.price <= 0) return Swal.fire('Ошибка', 'Введите корректную цену', 'error');

            setLoading(btn, 'Сохраняем...');

            let result;
            if (editId) {
                result = await SB.from('products').update(productData).eq('id', editId);
            } else {
                result = await SB.from('products').insert([productData]);
            }

            resetBtn(btn, editId ? '💾 Обновить' : '💾 Сохранить');

            if (result.error) {
                return Swal.fire('Ошибка', result.error.message, 'error');
            }

            closeModal();
            await loadProducts();
            await loadStats();
            Swal.fire({ title: 'Готово!', text: editId ? 'Товар обновлён' : 'Товар добавлен', icon: 'success', timer: 1500, showConfirmButton: false });
        }

        // ===== УДАЛЕНИЕ ТОВАРА =====
        async function deleteProduct(id) {
            const product = allProducts.find(p => p.id === id);
            const result = await Swal.fire({
                title: 'Удалить товар?',
                text: `"${product?.name}" будет удалён безвозвратно`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'Да, удалить',
                cancelButtonText: 'Отмена',
                confirmButtonColor: '#ef4444'
            });

            if (!result.isConfirmed) return;

            // Удаляем фото из Storage (если есть)
            if (product?.image_url && product.image_url.includes('product-images')) {
                const fileName = product.image_url.split('/').pop();
                await SB.storage.from('product-images').remove([fileName]);
            }

            const { error } = await SB.from('products').delete().eq('id', id);
            if (error) return Swal.fire('Ошибка', error.message, 'error');

            await loadProducts();
            await loadStats();
            Swal.fire({ title: 'Удалено!', text: 'Товар удалён', icon: 'success', timer: 1500, showConfirmButton: false });
        }

        // ===== ВЫХОД =====
        async function logout() {
            await SB.auth.signOut();
            window.location.href = 'index.html';
        }

        function setLoading(btn, text) {
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> ' + text;
        }
        function resetBtn(btn, text) {
            btn.disabled = false;
            btn.textContent = text;
        }

        document.getElementById('productModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
