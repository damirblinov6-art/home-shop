<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель — CozyHome</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --bg-input: #1a1a2e;
            --neon-purple: #a855f7;
            --neon-cyan: #06b6d4;
            --neon-pink: #ec4899;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #1e293b;
            --shadow-lg: 0 0 30px rgba(168,85,247,0.15);
            --radius: 14px;
            --transition: all 0.3s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            background-image: radial-gradient(ellipse at 20% 80%, rgba(6,182,212,0.08) 0%, transparent 50%);
            background-attachment: fixed;
        }
        .header {
            background: rgba(15,15,26,0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(6,182,212,0.2);
            padding: 15px 0;
        }
        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-actions { display: flex; gap: 10px; }
        .btn {
            padding: 12px 24px; border: 1px solid var(--border); border-radius: 50px; cursor: pointer;
            font-weight: 600; font-family: inherit; font-size: 14px; transition: var(--transition);
            background: transparent; color: var(--text-secondary);
        }
        .btn:hover { border-color: var(--neon-cyan); color: var(--text-primary); box-shadow: 0 0 15px rgba(6,182,212,0.2); }
        .btn-success {
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-cyan));
            color: white; border: none; box-shadow: 0 0 20px rgba(168,85,247,0.3);
        }
        .btn-success:hover { box-shadow: 0 0 30px rgba(168,85,247,0.5); transform: translateY(-2px); }
        .container { max-width: 1400px; margin: 0 auto; padding: 30px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 25px;
        }
        .stat-card .stat-value {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-card .stat-label { font-size: 14px; color: var(--text-secondary); margin-top: 5px; }
        .section-title {
            font-size: 24px; font-weight: 600; margin-bottom: 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .table-wrapper {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        thead { background: rgba(168,85,247,0.1); }
        th { color: var(--neon-purple); padding: 16px; text-align: left; font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        td { color: var(--text-secondary); padding: 14px 16px; border-top: 1px solid var(--border); font-size: 14px; }
        tr:hover td { background: rgba(6,182,212,0.05); }
        .product-cell { display: flex; align-items: center; gap: 12px; }
        .product-thumb {
            width: 48px; height: 48px; border-radius: 12px; object-fit: contain;
            background: var(--bg-primary); flex-shrink: 0;
        }
        .no-photo {
            width: 48px; height: 48px; border-radius: 12px; background: var(--bg-primary);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; flex-shrink: 0;
        }
        .actions { display: flex; gap: 8px; }
        .icon-btn {
            padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer;
            font-size: 16px; transition: var(--transition); background: transparent; color: var(--text-secondary);
        }
        .icon-btn:hover { border-color: var(--neon-purple); color: var(--text-primary); box-shadow: 0 0 10px rgba(168,85,247,0.3); }
        .icon-btn.delete:hover { border-color: #ef4444; box-shadow: 0 0 10px rgba(239,68,68,0.3); }
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            justify-content: center; align-items: center; z-index: 999; padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 35px;
            max-width: 550px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
        }
        .modal-content h3 { font-size: 22px; margin-bottom: 25px; }
        .field { margin-bottom: 18px; }
        .field label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 13px; color: var(--text-secondary); }
        .field input, .field textarea, .field select {
            width: 100%; padding: 12px 15px; border: 1px solid var(--border); border-radius: 10px;
            font-family: inherit; font-size: 15px; transition: var(--transition);
            background: var(--bg-input); color: var(--text-primary);
        }
        .field input:focus, .field textarea:focus { outline: none; border-color: var(--neon-purple); box-shadow: 0 0 15px rgba(168,85,247,0.2); }
        .field textarea { resize: vertical; min-height: 80px; }
        .field-hint { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
        .file-upload-area {
            border: 2px dashed var(--border); border-radius: 10px; padding: 30px;
            text-align: center; cursor: pointer; transition: var(--transition); background: var(--bg-primary);
        }
        .file-upload-area:hover { border-color: var(--neon-cyan); }
        .file-upload-area.drag-over { border-color: var(--neon-purple); box-shadow: 0 0 20px rgba(168,85,247,0.2); }
        .file-upload-icon { font-size: 40px; margin-bottom: 10px; }
        .file-upload-text { font-size: 14px; color: var(--text-secondary); }
        .file-upload-hint { font-size: 12px; color: #475569; margin-top: 5px; }
        #imagePreview {
            width: 100%; max-height: 200px; object-fit: contain;
            border-radius: 10px; margin-top: 10px; background: var(--bg-primary);
        }
        .upload-progress { margin-top: 10px; background: var(--border); border-radius: 10px; height: 8px; overflow: hidden; }
        .upload-progress-bar { height: 100%; background: linear-gradient(90deg, var(--neon-purple), var(--neon-cyan)); transition: width 0.3s; border-radius: 10px; }
        .modal-btns { display: flex; gap: 10px; margin-top: 25px; }
        .modal-btns .btn { flex: 1; }
        .empty-state { text-align: center; padding: 60px; color: var(--text-secondary); }
        .spinner {
            display: inline-block; width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.2); border-top-color: white;
            border-radius: 50%; animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) {
            .header-inner { flex-direction: column; gap: 15px; }
            .modal-content { padding: 25px; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-inner">
            <div class="logo">⚙️ Админ-панель CozyHome</div>
            <div class="header-actions">
                <button class="btn" onclick="window.open('index.html', '_blank')">🏠 На сайт</button>
                <button class="btn" onclick="logout()">🚪 Выйти</button>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="stats">
            <div class="stat-card"><div class="stat-value" id="totalProducts">0</div><div class="stat-label">📦 Товаров</div></div>
            <div class="stat-card"><div class="stat-value" id="totalOrders">0</div><div class="stat-label">🛒 Заказов</div></div>
            <div class="stat-card"><div class="stat-value" id="totalUsers">0</div><div class="stat-label">👥 Пользователей</div></div>
        </div>

        <div class="section-title">
            <span>📦 Товары</span>
            <button class="btn btn-success" onclick="openAddModal()">+ Добавить товар</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead><tr><th>Товар</th><th>Цена</th><th>Категория</th><th>Создан</th><th>Действия</th></tr></thead>
                <tbody id="productTableBody"><tr><td colspan="5"><div class="empty-state">📦 Загрузка...</div></td></tr></tbody>
            </table>
        </div>
    </div>

    <div class="modal" id="productModal">
        <div class="modal-content">
            <h3 id="modalTitle">📝 Добавить товар</h3>
            <input type="hidden" id="editId"><input type="hidden" id="existingImageUrl">
            <div class="field"><label>Название *</label><input type="text" id="prodName" placeholder="Название товара"></div>
            <div class="field"><label>Цена (₽) *</label><input type="number" id="prodPrice" placeholder="1499" min="0" step="1"></div>
            <div class="field"><label>Описание</label><textarea id="prodDesc" placeholder="Описание..."></textarea></div>
            <div class="field"><label>Категория</label>
                <select id="prodCategory">
                    <option value="Освещение">💡 Освещение</option><option value="Декор">🎨 Декор</option>
                    <option value="Текстиль">🧶 Текстиль</option><option value="Мебель">🪑 Мебель</option>
                    <option value="Кухня">🍳 Кухня</option><option value="Другое">📦 Другое</option>
                </select>
            </div>
            <div class="field">
                <label>Фото товара</label>
                <div class="file-upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
                    <div class="file-upload-icon">📸</div>
                    <div class="file-upload-text">Нажмите или перетащите фото</div>
                    <div class="file-upload-hint">JPG, PNG, WebP • макс. 5 МБ</div>
                </div>
                <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="handleFileSelect(event)">
                <img id="imagePreview" style="display:none;" alt="Превью">
                <div class="upload-progress" id="uploadProgress" style="display:none;"><div class="upload-progress-bar" id="uploadProgressBar" style="width:0%;"></div></div>
                <button class="btn" id="removeImageBtn" style="display:none;margin-top:10px;width:100%;" onclick="removeImage()">🗑️ Удалить фото</button>
            </div>
            <div class="modal-btns">
                <button class="btn btn-success" id="saveBtn" onclick="saveProduct()">💾 Сохранить</button>
                <button class="btn" onclick="closeModal()">Отмена</button>
            </div>
        </div>
    </div>

    <script>
        const SB = supabase.createClient(
            'https://riuftwtjtxmhyqwyfwta.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJpdWZ0d3RqdHhtaHlxd3lmd3RhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNTE2NzUsImV4cCI6MjA5NzcyNzY3NX0.uJCsY9ic9xLBJqYKEIbSvNqzYOKQFDzFqrK_zu2t6vw'
        );

        let user = null, allProducts = [], selectedFile = null;

        (async function init() {
            const { data: { session } } = await SB.auth.getSession();
            if (!session) { Swal.fire({ title: 'Доступ запрещён', text: 'Сначала войдите', icon: 'error', background: '#1a1a2e', color: '#f1f5f9' }).then(() => window.location.href = 'index.html'); return; }
            user = session.user;
            setupDragAndDrop();
            await loadStats(); await loadProducts();
        })();

        function setupDragAndDrop() {
            const dropZone = document.getElementById('dropZone');
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => dropZone.addEventListener(e, ev => { ev.preventDefault(); ev.stopPropagation(); }));
            ['dragenter', 'dragover'].forEach(e => dropZone.addEventListener(e, () => dropZone.classList.add('drag-over')));
            ['dragleave', 'drop'].forEach(e => dropZone.addEventListener(e, () => dropZone.classList.remove('drag-over')));
            dropZone.addEventListener('drop', e => { const file = e.dataTransfer.files[0]; if (file && file.type.startsWith('image/')) processFile(file); });
        }

        function handleFileSelect(event) { const file = event.target.files[0]; if (file) processFile(file); }

        function processFile(file) {
            if (file.size > 5*1024*1024) return Swal.fire({ title: 'Ошибка', text: 'Файл > 5 МБ', icon: 'error', background: '#1a1a2e', color: '#f1f5f9' });
            selectedFile = file;
            const reader = new FileReader();
            reader.onload = e => { document.getElementById('imagePreview').src = e.target.result; document.getElementById('imagePreview').style.display = 'block'; document.getElementById('removeImageBtn').style.display = 'block'; };
            reader.readAsDataURL(file);
        }

        function removeImage() { selectedFile = null; document.getElementById('imagePreview').style.display = 'none'; document.getElementById('removeImageBtn').style.display = 'none'; document.getElementById('fileInput').value = ''; document.getElementById('existingImageUrl').value = ''; }

        async function loadStats() {
            const [p, o, u] = await Promise.all([SB.from('products').select('*', { count: 'exact', head: true }), SB.from('orders').select('*', { count: 'exact', head: true }), SB.from('profiles').select('*', { count: 'exact', head: true })]);
            document.getElementById('totalProducts').textContent = p.count || 0;
            document.getElementById('totalOrders').textContent = o.count || 0;
            document.getElementById('totalUsers').textContent = u.count || 0;
        }

        async function loadProducts() { const { data } = await SB.from('products').select('*').order('created_at', { ascending: false }); allProducts = data || []; renderTable(allProducts); }

        function renderTable(products) {
            const tbody = document.getElementById('productTableBody');
            if (!products.length) { tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state">📦 Нет товаров</div></td></tr>'; return; }
            tbody.innerHTML = products.map(p => `<tr>
                <td><div class="product-cell">${p.image_url ? `<img src="${p.image_url}" class="product-thumb" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">` : ''}<div class="no-photo" style="${p.image_url ? 'display:none;' : ''}">📷</div><div><strong>${p.name}</strong><br><small>${(p.description||'').substring(0,40)}</small></div></div></td>
                <td><strong>${p.price} ₽</strong></td><td>${p.category||'—'}</td><td>${new Date(p.created_at).toLocaleDateString('ru-RU')}</td>
                <td><div class="actions"><button class="icon-btn" onclick="openEditModal('${p.id}')">✏️</button><button class="icon-btn delete" onclick="deleteProduct('${p.id}')">🗑️</button></div></td>
            </tr>`).join('');
        }

        function resetModal() {
            selectedFile = null; document.getElementById('editId').value = ''; document.getElementById('existingImageUrl').value = '';
            document.getElementById('prodName').value = ''; document.getElementById('prodPrice').value = ''; document.getElementById('prodDesc').value = '';
            document.getElementById('prodCategory').value = 'Другое'; document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('removeImageBtn').style.display = 'none'; document.getElementById('fileInput').value = '';
            document.getElementById('uploadProgress').style.display = 'none'; document.getElementById('uploadProgressBar').style.width = '0%';
        }

        function openAddModal() { resetModal(); document.getElementById('modalTitle').textContent = '📝 Добавить товар'; document.getElementById('saveBtn').textContent = '💾 Сохранить'; document.getElementById('productModal').classList.add('active'); }
        function openEditModal(id) {
            const product = allProducts.find(p => p.id === id); if (!product) return;
            resetModal(); document.getElementById('modalTitle').textContent = '✏️ Редактировать'; document.getElementById('editId').value = product.id;
            document.getElementById('prodName').value = product.name||''; document.getElementById('prodPrice').value = product.price||'';
            document.getElementById('prodDesc').value = product.description||''; document.getElementById('prodCategory').value = product.category||'Другое';
            document.getElementById('saveBtn').textContent = '💾 Обновить';
            if (product.image_url) { document.getElementById('existingImageUrl').value = product.image_url; document.getElementById('imagePreview').src = product.image_url; document.getElementById('imagePreview').style.display = 'block'; document.getElementById('removeImageBtn').style.display = 'block'; }
            document.getElementById('productModal').classList.add('active');
        }
        function closeModal() { document.getElementById('productModal').classList.remove('active'); resetModal(); }

        async function uploadImage(file) {
            const progressDiv = document.getElementById('uploadProgress'), progressBar = document.getElementById('uploadProgressBar');
            progressDiv.style.display = 'block'; progressBar.style.width = '30%';
            const fileName = `${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g, '_')}`;
            const { data, error } = await SB.storage.from('product-images').upload(fileName, file, { cacheControl: '3600', upsert: false });
            progressBar.style.width = '100%'; setTimeout(() => progressDiv.style.display = 'none', 500);
            if (error) { Swal.fire({ title: 'Ошибка', text: error.message, icon: 'error', background: '#1a1a2e', color: '#f1f5f9' }); return null; }
            const { data: urlData } = SB.storage.from('product-images').getPublicUrl(fileName);
            return urlData.publicUrl;
        }

        async function saveProduct() {
            const btn = document.getElementById('saveBtn'), editId = document.getElementById('editId').value;
            let imageUrl = document.getElementById('existingImageUrl').value;
            if (selectedFile) { setLoading(btn, 'Загружаем...'); const u = await uploadImage(selectedFile); if (u) imageUrl = u; else { resetBtn(btn, editId?'💾 Обновить':'💾 Сохранить'); return; } }
            const productData = { name: document.getElementById('prodName').value.trim(), price: parseFloat(document.getElementById('prodPrice').value)||0, description: document.getElementById('prodDesc').value.trim(), image_url: imageUrl||null, category: document.getElementById('prodCategory').value };
            if (!productData.name) return Swal.fire({ title: 'Ошибка', text: 'Введите название', icon: 'error', background: '#1a1a2e', color: '#f1f5f9' });
            if (!productData.price || productData.price<=0) return Swal.fire({ title: 'Ошибка', text: 'Введите цену', icon: 'error', background: '#1a1a2e', color: '#f1f5f9' });
            setLoading(btn, 'Сохраняем...');
            let result; if (editId) result = await SB.from('products').update(productData).eq('id', editId); else result = await SB.from('products').insert([productData]);
            resetBtn(btn, editId?'💾 Обновить':'💾 Сохранить');
            if (result.error) return Swal.fire({ title: 'Ошибка', text: result.error.message, icon: 'error', background: '#1a1a2e', color: '#f1f5f9' });
            closeModal(); await loadProducts(); await loadStats();
            Swal.fire({ title: 'Готово!', text: editId?'Обновлён':'Добавлен', icon: 'success', timer: 1500, showConfirmButton: false, background: '#1a1a2e', color: '#f1f5f9' });
        }

        async function deleteProduct(id) {
            const product = allProducts.find(p => p.id === id);
            const result = await Swal.fire({ title: 'Удалить?', text: product?.name, icon: 'warning', showCancelButton: true, confirmButtonText: 'Да', cancelButtonText: 'Нет', background: '#1a1a2e', color: '#f1f5f9' });
            if (!result.isConfirmed) return;
            if (product?.image_url?.includes('product-images')) { const fn = product.image_url.split('/').pop(); await SB.storage.from('product-images').remove([fn]); }
            const { error } = await SB.from('products').delete().eq('id', id);
            if (error) return Swal.fire({ title: 'Ошибка', text: error.message, icon: 'error', background: '#1a1a2e', color: '#f1f5f9' });
            await loadProducts(); await loadStats();
            Swal.fire({ title: 'Удалено!', icon: 'success', timer: 1500, showConfirmButton: false, background: '#1a1a2e', color: '#f1f5f9' });
        }

        async function logout() { await SB.auth.signOut(); window.location.href = 'index.html'; }
        function setLoading(btn, text) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> ' + text; }
        function resetBtn(btn, text) { btn.disabled = false; btn.textContent = text; }
        document.getElementById('productModal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });
    </script>
</body>
</html>
